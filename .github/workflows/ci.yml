# CI is scaffolded but disabled by default.
#
# To enable automatic runs on push/PR, replace `on:` with:
#
#   on:
#     push:
#       branches: [main]
#     pull_request:
#       branches: [main]
#
# Until then, trigger manually from GitHub Actions → CI → Run workflow.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run test:source-boundary
      - run: npm run test:evidence